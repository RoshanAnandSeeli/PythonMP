<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Thermal Analysis | v3.0</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg ">

    <!-- Modern Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body>
    <div id="ambient-background"></div>

    <div class="layout">
        <!-- Sidebar Controls -->
        <aside class="sidebar glass-panel">
            <div class="brand">
                <div class="logo-orb"></div>
                <div>
                    <h1>THERMALYTICS</h1>
                    <span>CORE ENGINE v3.0</span>
                </div>
            </div>

            <div class="controls">
                <div class="control-group">
                    <div class="control-header">
                        <label>Resolution Matrix</label>
                        <span id="gridSizeVal" class="val-display">40x40</span>
                    </div>
                    <div class="slider-container">
                        <input type="range" id="gridSize" min="10" max="80" value="40">
                    </div>
                </div>

                <div class="system-mode-card glass-panel-inner">
                    <div class="mode-label">SYSTEM MODE:<br><span class="accent-text pulse-text">LIVE SENSOR MODE</span></div>
                    
                    <div class="live-temp-display">
                        <label>LIVE TEMP</label>
                        <div class="temp-readout"><span id="liveTempValue">--</span><span class="unit">°C</span></div>
                    </div>

                    <div class="sensor-status-row">
                        <div class="sensor-status">
                            <div class="status-indicator red" id="sensorStatusLight"></div>
                            <span id="sensorStatusText">NO DATA</span>
                        </div>
                        <div class="last-update">
                            UPDATED: <span id="lastUpdatedTime">--:--:--</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="telemetry">
                <div class="telemetry-header">
                    <h3>LIVE LOGS</h3>
                    <div class="pulse-mini"></div>
                </div>
                <div id="terminalLogs" class="logs-container">
                    <!-- Logs populated via JS -->
                </div>
            </div>
        </aside>

        <!-- Main Dashboard View -->
        <main class="dashboard">
            <!-- HUD Decorators -->
            <div class="hud-overlay">
                <div class="crosshair tl"></div>
                <div class="crosshair tr"></div>
                <div class="crosshair bl"></div>
                <div class="crosshair br"></div>
            </div>

            <header class="topbar glass-panel">
                <div class="status-pill">
                    <div class="dot"></div>
                    <span>SYSTEM ONLINE</span>
                </div>

                <div class="metrics">
                    <div class="metric">
                        <span class="label">DATALINK</span>
                        <span class="value success-text">SECURE</span>
                    </div>
                    <div class="metric">
                        <span class="label">COMPUTE TIME</span>
                        <span class="value" id="simulationTime">0.00ms</span>
                    </div>
                </div>
            </header>

            <div class="viz-grid">
                <div class="viz-card glass-panel main-viz">
                    <div class="card-header">
                        <h2>3D TOPOLOGY RENDER</h2>
                        <div class="card-badge">LIVE</div>
                    </div>
                    <div id="heatmap" class="plotly-container"></div>
                </div>

                <div class="viz-card glass-panel side-viz">
                    <div class="card-header">
                        <h2>CROSS-SECTIONAL GRADIENT</h2>
                    </div>
                    <div id="graph" class="plotly-container"></div>
                </div>

                <div class="viz-card glass-panel intelligence">
                    <div class="card-header">
                        <h2>AI DIAGNOSTICS</h2>
                    </div>
                    <div class="ai-content">
                        <div class="ai-status">STANDBY</div>
                        <p id="suggestion">Awaiting initial telemetry sequence...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
