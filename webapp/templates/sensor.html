<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THERMAL_OS // PHONE_SENSOR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #030712;
            --cyan-glow: #06b6d4;
            --red-glow: #ef4444;
            --text-primary: #f1f5f9;
            --text-dim: #64748b;
            --border-glass: rgba(6, 182, 212, 0.15);
            --bg-panel: rgba(8, 12, 24, 0.85);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 50% 50%, rgba(6,182,212,0.03) 0%, transparent 70%),
                linear-gradient(rgba(6,182,212,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6,182,212,0.05) 1px, transparent 1px);
            background-size: cover, 40px 40px, 40px 40px;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-glass);
            border-radius: 1rem;
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(6,182,212,0.2);
        }
        .panel-header {
            background: rgba(6,182,212,0.1);
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            border-bottom: 1px solid var(--border-glass);
            color: var(--cyan-glow);
        }
        .pulse-dot {
            width: 8px; height: 8px;
            background: var(--cyan-glow);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--cyan-glow);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity:1; transform:scale(1); }
            50% { opacity:0.3; transform:scale(0.8); }
            100% { opacity:1; transform:scale(1); }
        }
        .panel-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; }
        .temp-display {
            text-align: center;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-glass);
            border-radius: 0.75rem;
            padding: 1.5rem;
        }
        .temp-label { font-family: 'JetBrains Mono',monospace; font-size: 0.65rem; color: var(--text-dim); letter-spacing: 3px; margin-bottom: 0.5rem; }
        .temp-value { font-family: 'JetBrains Mono',monospace; font-size: 3.5rem; font-weight: 700; color: #fff; text-shadow: 0 0 20px rgba(6,182,212,0.4); }
        .temp-value span { font-size: 1.2rem; color: var(--text-dim); }
        .accel-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }
        .accel-item { background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass); border-radius: 0.5rem; padding: 0.75rem; text-align: center; }
        .accel-item .label { font-family: 'JetBrains Mono',monospace; font-size: 0.6rem; color: var(--text-dim); margin-bottom: 0.25rem; }
        .accel-item .val { font-family: 'JetBrains Mono',monospace; font-size: 0.9rem; color: var(--cyan-glow); font-weight: 700; }
        .start-btn { background: var(--cyan-glow); color: var(--bg-dark); border: none; padding: 1rem; border-radius: 0.5rem; font-weight: 900; font-family: 'JetBrains Mono',monospace; font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; box-shadow: 0 0 15px var(--cyan-glow); width: 100%; }
        .status-row { display: flex; align-items: center; gap: 0.75rem; font-family: 'JetBrains Mono',monospace; font-size: 0.75rem; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red-glow); box-shadow: 0 0 8px var(--red-glow); }
        .status-dot.active { background: var(--cyan-glow); box-shadow: 0 0 8px var(--cyan-glow); }
        .log-box { background: rgba(0,0,0,0.4); border: 1px solid var(--border-glass); border-radius: 0.5rem; padding: 0.75rem; height: 120px; overflow-y: auto; font-family: 'JetBrains Mono',monospace; font-size: 0.7rem; }
        .log-line { color: #818cf8; margin-bottom: 0.3rem; }
        .log-line.ok { color: var(--cyan-glow); }
        .log-line.err { color: var(--red-glow); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--cyan-glow); border-radius: 2px; }
    </style>
</head>
<body>
    <div class="panel">
        <div class="panel-header">
            <span class="pulse-dot"></span>
            PHONE_SENSOR_LINK
        </div>
        <div class="panel-body">
            <div class="temp-display">
                <div class="temp-label">_COMPUTED_TEMP_EQUIVALENT</div>
                <div class="temp-value"><span id="tempValue">--</span><span>°C</span></div>
            </div>
            <div class="accel-grid">
                <div class="accel-item"><div class="label">_ACCEL_X</div><div class="val" id="accelX">0.00</div></div>
                <div class="accel-item"><div class="label">_ACCEL_Y</div><div class="val" id="accelY">0.00</div></div>
                <div class="accel-item"><div class="label">_ACCEL_Z</div><div class="val" id="accelZ">0.00</div></div>
            </div>
            <div class="status-row">
                <span class="status-dot" id="statusDot"></span>
                <span id="connectionStatus">WAITING_FOR_PERMISSION...</span>
            </div>
            <button class="start-btn" id="startBtn">ACTIVATE_SENSORS</button>
            <div id="sensorStatus" style="font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--red-glow)">SENSORS_NOT_STARTED</div>
            <div class="log-box" id="logs"><div class="log-line">> SYSTEM_INITIALIZED</div></div>
        </div>
    </div>
    <script>
        function log(msg, type='') {
            const logs = document.getElementById('logs');
            const e = document.createElement('div');
            e.className = 'log-line ' + type;
            e.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logs.prepend(e);
            while (logs.children.length > 20) logs.removeChild(logs.lastChild);
        }
        let currentX=0, currentY=0, currentZ=0, smoothedIntensity=0, isSending=false;

        document.getElementById('startBtn').addEventListener('click', async () => {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const perm = await DeviceMotionEvent.requestPermission();
                    if (perm === 'granted') startSensors();
                    else { document.getElementById('sensorStatus').innerText='PERMISSION_DENIED'; log('Permission denied','err'); }
                } catch(e) { log(`Error: ${e}`,'err'); }
            } else { startSensors(); }
        });

        function startSensors() {
            document.getElementById('startBtn').style.display='none';
            document.getElementById('sensorStatus').innerText='SENSORS_ACTIVE';
            document.getElementById('sensorStatus').style.color='#06b6d4';
            document.getElementById('statusDot').classList.add('active');
            log('Sensors activated','ok');
            smoothedIntensity = 28.0;
            window.addEventListener('devicemotion', (event) => {
                const accel = event.accelerationIncludingGravity || event.acceleration;
                if (!accel) return;
                currentX = accel.x||0; currentY = accel.y||0; currentZ = accel.z||0;
                document.getElementById('accelX').innerText = currentX.toFixed(2);
                document.getElementById('accelY').innerText = currentY.toFixed(2);
                document.getElementById('accelZ').innerText = currentZ.toFixed(2);
                const intensity = Math.sqrt(currentX**2 + currentY**2 + currentZ**2);
                let targetTemp = 28.0;
                if (intensity > 9.8) targetTemp = 28.0 + (intensity - 9.8) * 4.0;
                smoothedIntensity = (smoothedIntensity * 0.9) + (targetTemp * 0.1);
                smoothedIntensity = Math.min(100, Math.max(20, smoothedIntensity));
                document.getElementById('tempValue').innerText = smoothedIntensity.toFixed(2);
            });
        }

        setInterval(async () => {
            if (smoothedIntensity === 0 || isSending) return;
            isSending = true;
            try {
                const res = await fetch("/sensor-data", {
                    method:"POST", headers:{"Content-Type":"application/json"},
                    body: JSON.stringify({ temperature: smoothedIntensity.toFixed(2), x: currentX.toFixed(2), y: currentY.toFixed(2), z: currentZ.toFixed(2) })
                });
                if (res.ok) {
                    document.getElementById('connectionStatus').innerText='TRANSMITTING_OK';
                    document.getElementById('statusDot').classList.add('active');
                    log(`Sent: ${smoothedIntensity.toFixed(2)}°C`, 'ok');
                } else {
                    document.getElementById('connectionStatus').innerText='SERVER_ERROR';
                    log(`Failed: HTTP ${res.status}`,'err');
                }
            } catch(e) {
                document.getElementById('connectionStatus').innerText='NETWORK_DROP';
                document.getElementById('statusDot').classList.remove('active');
                log(`Network: ${e.message}`,'err');
            } finally { isSending = false; }
        }, 3000);
    </script>
</body>
</html>
